<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoPhish — Phishing Detection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="loading-bar.css">
</head>

<body data-theme="light">

    <!-- Nav -->
    <div class="menu-area">
        <a href="#" class="logo">No<span>Phish</span></a>
        <ul class="nav">
            <li><a href="#home">Home</a></li>
        </ul>
        <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle color theme">Dark mode</button>
    </div>

    <!-- Hero — fish image strip -->
    <section class="hero-banner" aria-hidden="true"></section>

    <!-- Headline below hero -->
    <div class="clarity-headline">
        <h2>Detect <span>phishing</span> before it&rsquo;s too late.</h2>
        <p>Powered by Machine Learning &middot; Instant Results &middot; Free to use</p>
    </div>

    <!-- Checker -->
    <section id="home">
        <div class="mode-switch">
            <button type="button" class="mode-btn is-active" data-mode="url">URL Checker</button>
            <button type="button" class="mode-btn" data-mode="email">Email Checker</button>
        </div>

        <div class="checker-panels">
            <div id="result" class="result-message result-default"></div>

            <!-- URL Panel -->
            <div class="Url panel panel-url active">
                <div class="scan-loader" id="urlLoader"></div>
                <h1>URL Checker</h1>
                <input type="text" id="urlInput" placeholder="Paste a suspicious link here&hellip;">
                <div class="panel-actions">
                    <button type="button" onclick="checkURL()">Scan Link</button>
                    <button id="urlLastToggle" class="last-submission-toggle" type="button" hidden
                        aria-expanded="false" aria-controls="urlLastDetails">&#9662;</button>
                </div>
                <div id="urlLastDetails" class="last-submission-details" hidden>
                    <p class="last-submission-title">Last tested URL</p>
                    <p id="urlLastContent" class="last-submission-item-value"></p>
                </div>
            </div>

            <!-- Email Panel -->
            <form class="email-content panel panel-email">
                <div class="scan-loader" id="emailLoader"></div>
                <h1>Email Checker</h1>
                <input type="email" id="sender" placeholder="Sender email address">
                <input type="email" id="receiver" placeholder="Receiver email address">
                <input type="text" id="subject" placeholder="Subject line">
                <textarea id="email-body" placeholder="Paste the email body here&hellip;"></textarea>
                <div class="panel-actions">
                    <button type="button" onclick="analyzeEmail()">Analyze Email</button>
                    <button id="emailLastToggle" class="last-submission-toggle" type="button" hidden
                        aria-expanded="false" aria-controls="emailLastDetails">&#9662;</button>
                </div>
                <div id="emailLastDetails" class="last-submission-details" hidden>
                    <p class="last-submission-title">Last tested email</p>
                    <div id="emailLastContent" class="last-submission-content"></div>
                </div>
            </form>
            <div id="riskCard" class="risk-card" style="display: none;">
                <!-- Custom ldBar wave:
                     data-bbox = x y width height of the drawing area
                     M20 90 = start point (x=20, y=90)
                     Each Q uses: controlX controlY endX endY
                     Q80 25 140 90 = curve up toward (80,25), then end at (140,90)
                     Smaller controlY values go higher; larger ones go lower
                     data-value = starting fill percentage before JS updates it -->
                <div id="emailConfidenceBar" class="ldBar label-center"
                    style="width: min(640px, 88vw); height: 130px; margin: 0 auto;"
                    data-stroke="data:ldbar/res,gradient(0,1,#9df,#9fd,#df9,#fd9)"
                    data-stroke-width="14"
                    data-stroke-trail-width="9"
                    data-padding="14"
                    data-set-dim="false"
                    data-bbox="20 25 840 130"
                    data-path="M20 90Q80 25 140 90Q200 155 260 90Q320 25 380 90Q440 155 500 90Q560 25 620 90Q680 155 740 90Q800 25 860 90"
                    data-value="0"></div>
                <p id="riskLevelText" class="risk-level-text">Risk Level</p>
            </div>
        </div>
    </section>

    <script src="loading-bar.js"></script>
    <script src="script.js"></script>

</body>
</html>
