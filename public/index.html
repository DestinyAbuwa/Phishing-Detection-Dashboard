<!DOCTYPE html>
<html>
<head>
    <title>Phishing Detection Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="loading-bar.css">
</head>

<body data-theme="light">
    <div class="menu-area">
        <a href="#" class="logo">NoPhish</a>
        <ul class="nav">
        <li><a href="#home">Home</a></li>
        </ul>
        <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle color theme">Dark mode</button>
    </div>
    <section class="hero-banner"></section>
    <section id="home">
        <div class="mode-switch">
            <button type="button" class="mode-btn is-active" data-mode="url">URL Checker</button>
            <button type="button" class="mode-btn" data-mode="email">Email Checker</button>
        </div>

        <div class="checker-panels">
            <div id="result" class="result-message result-default"></div>

            <div class="Url panel panel-url active">
                <div class="scan-loader" id="urlLoader"></div>
                <h1>URL Checker</h1>
                <input type="text" id="urlInput" placeholder="Paste link here...">
                <div class="panel-actions">
                    <button onclick="checkURL()">Scan Link</button>
                    <button id="urlLastToggle" class="last-submission-toggle" type="button" hidden aria-expanded="false" aria-controls="urlLastDetails" aria-label="Show last tested URL">&#9662;</button>
                </div>
                <div id="urlLastDetails" class="last-submission-details" hidden>
                    <p class="last-submission-title">Last tested URL</p>
                    <p id="urlLastContent" class="last-submission-content"></p>
                </div>
                
            </div>

            <form class="email-content panel panel-email">
                <div class="scan-loader" id="emailLoader"></div>
                <h1>Email Content Checker</h1>
                <input type="email" id="sender" placeholder="Sender Email">
                <input type="email" id="receiver" placeholder="Receiver Email">
                <input type="text" id="subject" placeholder="Subject">
                <textarea id="email-body" placeholder="Email Body"></textarea>
                <div class="panel-actions">
                    <button type="button" onclick="analyzeEmail()">Analyze Email</button>
                    <button id="emailLastToggle" class="last-submission-toggle" type="button" hidden aria-expanded="false" aria-controls="emailLastDetails" aria-label="Show last tested email">&#9662;</button>
                </div>
                <div id="emailLastDetails" class="last-submission-details" hidden>
                    <p class="last-submission-title">Last tested email</p>
                    <div id="emailLastContent" class="last-submission-content"></div>
                </div>
            </form>
            <div id="riskCard" class="risk-card" style="display: none;">
                <!-- Custom ldBar wave:
                     data-bbox = x y width height of the drawing area
                     M20 90 = start point (x=20, y=90)
                     Each Q uses: controlX controlY endX endY
                     Q80 25 140 90 = curve up toward (80,25), then end at (140,90)
                     Smaller controlY values go higher; larger ones go lower
                     data-value = starting fill percentage before JS updates it -->
                <div id="emailConfidenceBar" class="ldBar label-center"
                    style="width: min(700px, 88vw); height: 130px; margin: 0 auto;"
                    data-stroke="data:ldbar/res,gradient(0,1,#9df,#9fd,#df9,#fd9)"
                    data-stroke-width="14"
                    data-stroke-trail-width="9"
                    data-padding="14"
                    data-set-dim="false"
                    data-bbox="20 25 840 130"
                    data-path="M20 90Q80 25 140 90Q200 155 260 90Q320 25 380 90Q440 155 500 90Q560 25 620 90Q680 155 740 90Q800 25 860 90"
                    data-value="0"></div>
                <p id="riskLevelText" class="risk-level-text">Risk Level</p>
            </div>
        </div>

        

    </section>

    <script src="loading-bar.js"></script>
    <script src="script.js"></script>

    
    
</body>
</html>
